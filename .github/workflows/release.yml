name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'app-v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm exec tsc --noEmit

      - name: Lint frontend
        run: pnpm exec eslint .

      - name: Test frontend
        run: pnpm test

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Test Rust
        run: cargo test
        working-directory: src-tauri

  create-release:
    name: Create GitHub Release
    needs: test
    if: github.ref_type == 'tag'
    runs-on: ubuntu-22.04
    outputs:
      release-id: ${{ steps.release.outputs.release-id }}
    steps:
      - name: Create or reuse draft release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BODY: Automated desktop release. Installers are attached below.
          RELEASE_NAME: marko ${{ github.ref_name }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          release_id="$(
            gh api "repos/$GITHUB_REPOSITORY/releases" \
              --jq "map(select(.tag_name == \"$RELEASE_TAG\"))[0].id"
          )"

          if [ -z "$release_id" ] || [ "$release_id" = "null" ]; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --verify-tag \
              --title "$RELEASE_NAME" \
              --notes "$RELEASE_BODY"

            release_id="$(
              gh api "repos/$GITHUB_REPOSITORY/releases" \
                --jq "map(select(.tag_name == \"$RELEASE_TAG\"))[0].id"
            )"
          fi

          if [ -z "$release_id" ] || [ "$release_id" = "null" ]; then
            echo "Unable to resolve release id for $RELEASE_TAG" >&2
            exit 1
          fi
          echo "release-id=$release_id" >> "$GITHUB_OUTPUT"

  build-release:
    name: Build ${{ matrix.platform }}
    needs:
      - test
      - create-release
    if: ${{ always() && needs.test.result == 'success' && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'app-v__VERSION__' }}
          releaseName: ${{ github.ref_type == 'tag' && format('marko {0}', github.ref_name) || 'marko v__VERSION__' }}
          releaseBody: 'Automated desktop release. Installers are attached below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>marko</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1c1a;
        font-family:
          Inter,
          'Segoe UI',
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        color: #f7faf8;
      }

      .splash {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 14px;
      }

      .logo {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        filter: drop-shadow(0 18px 32px rgba(0, 0, 0, 0.28));
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        margin: -4px 0 0;
        font-size: 12px;
        color: rgba(247, 250, 248, 0.64);
      }

      .bar {
        width: 144px;
        height: 3px;
        margin-top: 2px;
        background: rgba(139, 231, 208, 0.16);
        border-radius: 999px;
        overflow: hidden;
        position: relative;
      }

      .bar::after {
        content: '';
        position: absolute;
        inset: 0;
        width: 42%;
        background: #8be7d0;
        border-radius: inherit;
        animation: loading 1.15s ease-in-out infinite;
      }

      @keyframes loading {
        0% {
          transform: translateX(-100%);
        }
        50% {
          transform: translateX(120%);
        }
        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="brand">
        <img class="logo" src="./marko.svg" alt="marko" />
        <h1>marko</h1>
        <p>Opening workspace...</p>
        <div class="bar" aria-hidden="true"></div>
      </div>
    </div>
  </body>
</html>
